<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">WSI Labs mark</title>
  <desc id="desc">A geometric WSI monogram mark.</desc>
  <rect width="512" height="512" fill="none"/>
  <!-- Top-left quadrant -->
  <rect x="72" y="72" width="156" height="156" fill="#111"/>
  <!-- Top-right quadrant (hollow) -->
  <rect x="284" y="72" width="156" height="156" fill="none" stroke="#111" stroke-width="2"/>
  <!-- Bottom-left quadrant (hollow) -->
  <rect x="72" y="284" width="156" height="156" fill="none" stroke="#111" stroke-width="2"/>
  <!-- Bottom-right quadrant -->
  <rect x="284" y="284" width="156" height="156" fill="#111"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="#111"/>
</svg>
